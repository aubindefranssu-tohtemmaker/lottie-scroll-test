<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lottie – Baseline</title>

  <!-- Web Component DotLottie (version stable) -->
  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@1/dist/dotlottie-wc.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    dotlottie-wc {
      width: 500px;
      height: 500px;
    }
  </style>
</head>

<body>

  <!-- Animation Lottie SANS autoplay, SANS JS -->
  <dotlottie-wc
    id="myLottie"
    src="./anim.json"
    autoplay="false"
    loop="false">
  </dotlottie-wc>

</body>
</html>
