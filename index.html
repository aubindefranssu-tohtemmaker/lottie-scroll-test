<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lottie Scroll Control Demo</title>

  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>

  <style>
    html, body {
      margin: 0;
      height: 200vh;
      background: #f5f5f7;
    }
    .wrapper {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    dotlottie-wc {
      width: 500px;
      height: 500px;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <dotlottie-wc id="myLottie"
      src="./anim.json"
      autoplay="false"
      loop="false">
    </dotlottie-wc>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const el = document.getElementById("myLottie");
      const anim = await el.getLottie();

      anim.stop();
      anim.loop = false;

      let pos = 0;
      const FACTEUR = 6;

      window.addEventListener("wheel", (e) => {
        pos += (e.deltaY * FACTEUR) / 100;
        pos = Math.max(0, Math.min(100, pos));
        anim.seek(pos + "%");
        if (pos >= 100) anim.goToAndStop(anim.totalFrames, true);
      }, { passive: true });
    });
  </script>

</body>
</html>
