<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lottie Scroll Control Demo</title>

  <!-- Import du web component DotLottie -->
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>

  <style>
    body {
      margin: 0;
      height: 200vh; /* permet d'avoir une zone de scroll suffisante */
      background: #f4f4f4;
    }

    .wrapper {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    dotlottie-wc {
      width: 500px;
      height: 500px;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <dotlottie-wc 
      id="myLottie"
      src="https://lottie.host/efccb87b-3a68-40b3-a971-aeb8a8d55d77/YuYgCZedvC.lottie"
      autoplay="false"
      loop="false"
      speed="1">
    </dotlottie-wc>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {

      const el = document.getElementById("myLottie");

      // Attente du player Lottie interne
      const anim = await el.getLottie();

      // Désactivation totale autoplay
      anim.stop();
      anim.loop = false;

      // Valeur de progression (0 → 100 %)
      let pos = 0;

      // Coefficient d'accélération du scroll :
      // augmente pour parcourir l’animation plus vite
      const FACTEUR = 4.5;  // Ajuste ici selon feeling

      window.addEventListener("wheel", (e) => {

        // deltaY positif = scroll bas → avance animation
        // deltaY négatif = scroll haut → recule animation
        pos += (e.deltaY * FACTEUR) / 100;

        // Clamp 0–100 %
        pos = Math.min(100, Math.max(0, pos));

        // Aller à la position dans l'anim
        anim.seek(pos + "%");

        // Sécurité anti-loop → stop frame finale
        if (pos >= 100) {
          anim.goToAndStop(anim.totalFrames, true);
        }

      }, { passive: true });

    });
  </script>

</body>
</html>
